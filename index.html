<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Nashville Favorites</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F0E8;
      --dark: #2C2418;
      --warm: #A0785A;
      --accent: #D4603A;
      --muted: #8B7D6B;
      --card: #FFFDF8;
      --border: #E2D9CC;
      --card-hover: #FFFBF3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Karla', sans-serif;
      background: var(--cream);
      color: var(--dark);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      text-align: center;
      padding: 3.5rem 1.5rem 2rem;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--dark);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0.5rem 1rem 3rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .section-header .emoji {
      font-size: 1.2rem;
      line-height: 1;
    }

    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--dark);
      letter-spacing: -0.01em;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.85rem;
    }

    .item-top {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem 0.5rem;
      margin-bottom: 0.2rem;
    }

    .item-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--dark);
    }

    .map-links {
      display: inline-flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .map-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--cream);
      white-space: nowrap;
      transition: border-color 150ms ease;
    }

    .map-link:hover {
      border-color: var(--accent);
    }

    .item-desc {
      font-size: 0.9rem;
      color: var(--dark);
      line-height: 1.55;
    }

    .item-note {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 0.25rem;
      line-height: 1.45;
    }

    .callout {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 0.75rem 0.85rem;
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
      max-width: 640px;
      margin: 0 auto;
    }

    .loading {
      text-align: center;
      padding: 4rem 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .hero {
        padding: 2.5rem 1rem 1.5rem;
      }

      .hero h1 {
        font-size: 1.7rem;
      }

      .hero p {
        font-size: 0.9rem;
      }

      .container {
        padding: 0.5rem 0.75rem 2.5rem;
      }

      .item {
        padding: 0.7rem 0.75rem;
      }

      .item-top {
        flex-direction: column;
        gap: 0.25rem;
      }

      .map-links {
        gap: 0.3rem;
      }

      .map-link {
        font-size: 0.76rem;
        padding: 3px 8px;
      }

      .item-desc {
        font-size: 0.87rem;
      }

      .section-header h2 {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1 id="page-title"></h1>
    <p id="page-subtitle"></p>
  </div>

  <div class="container" id="content">
    <div class="loading">Loading...</div>
  </div>

  <div class="footer" id="page-footer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script>
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function render(data) {
      document.title = data.title || 'Nashville Favorites';
      document.getElementById('page-title').textContent = data.title || '';
      document.getElementById('page-subtitle').textContent = data.subtitle || '';
      document.getElementById('page-footer').textContent = data.footer || '';

      var container = document.getElementById('content');
      container.innerHTML = '';

      if (!data.sections) return;

      data.sections.forEach(function(section) {
        var div = document.createElement('div');
        div.className = 'section';

        var html = '<div class="section-header">';
        html += '<span class="emoji">' + escapeHtml(section.emoji || '') + '</span>';
        html += '<h2>' + escapeHtml(section.name) + '</h2>';
        html += '</div>';

        if (section.items && section.items.length) {
          html += '<div class="items">';
          section.items.forEach(function(item) {
            html += '<div class="item">';
            html += '<div class="item-top">';
            html += '<span class="item-title">' + escapeHtml(item.title) + '</span>';

            if (item.map) {
              var appleUrl = 'https://maps.apple.com/?q=' + encodeURIComponent(item.title);
              html += '<span class="map-links">';
              html += '<a class="map-link" href="' + encodeURI(item.map) + '" target="_blank" rel="noopener">&#x1f4cd; Google</a>';
              html += '<a class="map-link" href="' + appleUrl + '" target="_blank" rel="noopener">&#x1f34e; Apple</a>';
              html += '</span>';
            }

            html += '</div>';
            html += '<div class="item-desc">' + escapeHtml(item.description) + '</div>';
            if (item.note) {
              html += '<div class="item-note">' + escapeHtml(item.note) + '</div>';
            }
            html += '</div>';
          });
          html += '</div>';
        }

        if (section.callout) {
          html += '<div class="callout">' + escapeHtml(section.callout) + '</div>';
        }

        div.innerHTML = html;
        container.appendChild(div);
      });
    }

    fetch('data.yml')
      .then(function(res) {
        if (!res.ok) throw new Error('Could not load data.yml');
        return res.text();
      })
      .then(function(text) {
        var data = jsyaml.load(text);
        render(data);
      })
      .catch(function(err) {
        document.getElementById('content').innerHTML =
          '<div class="loading">Could not load data.yml &mdash; make sure it is in the same directory as index.html</div>';
        console.error(err);
      });
  </script>

</body>
</html>

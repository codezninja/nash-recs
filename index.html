<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Nashville Favorites</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F0E8;
      --dark: #2C2418;
      --warm: #A0785A;
      --accent: #D4603A;
      --muted: #8B7D6B;
      --card: #FFFDF8;
      --border: #E2D9CC;
      --sidebar-bg: #EDE8DF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Karla', sans-serif;
      background: var(--cream);
      color: var(--dark);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Sidebar (desktop) --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 2rem 0 1.5rem;
      overflow-y: auto;
      z-index: 10;
    }

    .sidebar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--dark);
      padding: 0 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
    }

    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.25rem;
      font-size: 0.88rem;
      color: var(--dark);
      text-decoration: none;
      transition: background 150ms ease;
    }

    .sidebar nav a:hover {
      background: var(--border);
    }

    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar nav a .nav-emoji {
      font-size: 1rem;
      width: 1.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    /* --- Main content offset --- */
    .main {
      margin-left: 240px;
    }

    .hero {
      text-align: center;
      padding: 3rem 1.5rem 1.5rem;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--dark);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0.5rem 1rem 3rem;
    }

    .section {
      margin-bottom: 2rem;
      scroll-margin-top: 1rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .section-header .emoji {
      font-size: 1.2rem;
      line-height: 1;
    }

    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--dark);
      letter-spacing: -0.01em;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.85rem;
    }

    .item-top {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem 0.5rem;
      margin-bottom: 0.2rem;
    }

    .item-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--dark);
    }

    .map-links {
      display: inline-flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .map-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--cream);
      white-space: nowrap;
      transition: border-color 150ms ease;
    }

    .map-link:hover {
      border-color: var(--accent);
    }

    .item-desc {
      font-size: 0.9rem;
      color: var(--dark);
      line-height: 1.55;
    }

    .item-note {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 0.25rem;
      line-height: 1.45;
    }

    .callout {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 0.75rem 0.85rem;
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
      max-width: 640px;
      margin: 0 auto;
    }

    .loading {
      text-align: center;
      padding: 4rem 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* --- Mobile menu button --- */
    .menu-btn {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 30;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .menu-btn svg {
      width: 20px;
      height: 20px;
      color: var(--dark);
    }

    /* --- Mobile overlay --- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 24, 0.3);
      z-index: 15;
    }

    .overlay.open {
      display: block;
    }

    /* --- Mobile --- */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 200ms ease;
        z-index: 20;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-btn {
        display: flex;
      }

      .main {
        margin-left: 0;
      }

      .hero {
        padding: 3.5rem 1rem 1.5rem;
      }

      .hero h1 {
        font-size: 1.7rem;
      }

      .hero p {
        font-size: 0.9rem;
      }

      .container {
        padding: 0.5rem 0.75rem 2.5rem;
      }

      .item {
        padding: 0.7rem 0.75rem;
      }

      .item-top {
        flex-direction: column;
        gap: 0.25rem;
      }

      .map-links {
        gap: 0.3rem;
      }

      .map-link {
        font-size: 0.76rem;
        padding: 3px 8px;
      }

      .item-desc {
        font-size: 0.87rem;
      }

      .section-header h2 {
        font-size: 1.15rem;
      }

      .section {
        scroll-margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <button class="menu-btn" id="menu-btn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="4" y1="7" x2="20" y2="7"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="17" x2="20" y2="17"/>
    </svg>
  </button>

  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title" id="sidebar-title"></div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <div class="main">
    <div class="hero">
      <h1 id="page-title"></h1>
      <p id="page-subtitle"></p>
    </div>

    <div class="container" id="content">
      <div class="loading">Loading...</div>
    </div>

    <div class="footer" id="page-footer"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script>
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    // Mobile menu toggle
    var menuBtn = document.getElementById('menu-btn');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('overlay');

    function openMenu() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
    }

    function closeMenu() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }

    menuBtn.addEventListener('click', function() {
      sidebar.classList.contains('open') ? closeMenu() : openMenu();
    });

    overlay.addEventListener('click', closeMenu);

    // Scroll spy: highlight active section in sidebar
    function updateActiveNav() {
      var links = document.querySelectorAll('#sidebar-nav a');
      var fromTop = window.scrollY + 60;
      links.forEach(function(link) {
        var section = document.querySelector(link.getAttribute('href'));
        if (!section) return;
        if (section.offsetTop <= fromTop && section.offsetTop + section.offsetHeight > fromTop) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    window.addEventListener('scroll', updateActiveNav, { passive: true });

    function render(data) {
      document.title = data.title || 'Nashville Favorites';
      document.getElementById('page-title').textContent = data.title || '';
      document.getElementById('page-subtitle').textContent = data.subtitle || '';
      document.getElementById('page-footer').textContent = data.footer || '';
      document.getElementById('sidebar-title').textContent = data.title || '';

      var container = document.getElementById('content');
      container.innerHTML = '';

      var nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';

      if (!data.sections) return;

      data.sections.forEach(function(section) {
        var id = slugify(section.name);
        var div = document.createElement('div');
        div.className = 'section';
        div.id = id;

        // Sidebar nav link
        var a = document.createElement('a');
        a.href = '#' + id;
        a.innerHTML = '<span class="nav-emoji">' + escapeHtml(section.emoji || '') + '</span>' + escapeHtml(section.name);
        a.addEventListener('click', function() { closeMenu(); });
        nav.appendChild(a);

        // Section content
        var html = '<div class="section-header">';
        html += '<span class="emoji">' + escapeHtml(section.emoji || '') + '</span>';
        html += '<h2>' + escapeHtml(section.name) + '</h2>';
        html += '</div>';

        if (section.items && section.items.length) {
          html += '<div class="items">';
          section.items.forEach(function(item) {
            html += '<div class="item">';
            html += '<div class="item-top">';
            html += '<span class="item-title">' + escapeHtml(item.title) + '</span>';

            if (item.map) {
              var appleUrl = 'https://maps.apple.com/?q=' + encodeURIComponent(item.title);
              html += '<span class="map-links">';
              html += '<a class="map-link" href="' + encodeURI(item.map) + '" target="_blank" rel="noopener">&#x1f4cd; Google</a>';
              html += '<a class="map-link" href="' + appleUrl + '" target="_blank" rel="noopener">&#x1f34e; Apple</a>';
              html += '</span>';
            }

            html += '</div>';
            html += '<div class="item-desc">' + escapeHtml(item.description) + '</div>';
            if (item.note) {
              html += '<div class="item-note">' + escapeHtml(item.note) + '</div>';
            }
            html += '</div>';
          });
          html += '</div>';
        }

        if (section.callout) {
          html += '<div class="callout">' + escapeHtml(section.callout) + '</div>';
        }

        div.innerHTML = html;
        container.appendChild(div);
      });

      updateActiveNav();
    }

    fetch('data.yml')
      .then(function(res) {
        if (!res.ok) throw new Error('Could not load data.yml');
        return res.text();
      })
      .then(function(text) {
        var data = jsyaml.load(text);
        render(data);
      })
      .catch(function(err) {
        document.getElementById('content').innerHTML =
          '<div class="loading">Could not load data.yml &mdash; make sure it is in the same directory as index.html</div>';
        console.error(err);
      });
  </script>

</body>
</html>
